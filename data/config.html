<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuracoes - WhatsApp Desktop</title>
  <style>
    :root {
      --bg-primary: #111b21; --bg-secondary: #202c33; --bg-hover: #2a3942;
      --text-primary: #e9edef; --text-secondary: #8696a0;
      --accent: #00a884; --danger: #ea0038; --border: #2a3942;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #f0f2f5; --bg-secondary: #ffffff; --bg-hover: #f5f6f6;
        --text-primary: #111b21; --text-secondary: #667781;
        --accent: #008069; --danger: #ea0038; --border: #e9edef;
      }
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg-primary);color:var(--text-primary);
      padding:28px 32px;user-select:none;overflow-y:auto;
    }
    h1{font-size:22px;font-weight:600;margin-bottom:28px}
    h2{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-top:28px}
    h2:first-of-type{margin-top:0}
    .section{margin-bottom:8px}
    .card{background:var(--bg-secondary);border-radius:10px;padding:14px 18px;margin-bottom:8px}
    .account-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .account-item:last-child{border-bottom:none}
    .account-emoji{font-size:24px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;background:var(--bg-hover);transition:background 0.15s;position:relative}
    .account-emoji:hover{background:var(--border)}
    .account-info{flex:1;display:flex;flex-direction:column;gap:4px}
    .account-name-row{display:flex;align-items:center;gap:8px}
    .account-name{font-size:15px;font-weight:500}
    .account-shortcut{font-size:11px;color:var(--text-secondary);background:var(--bg-hover);padding:2px 6px;border-radius:4px}
    .account-theme-row{display:flex;align-items:center;gap:6px}
    .account-theme-label{font-size:12px;color:var(--text-secondary)}
    select{background:var(--bg-primary);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;outline:none;cursor:pointer}
    .account-actions{display:flex;gap:4px}
    .btn{padding:7px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;transition:background 0.15s,opacity 0.15s;font-weight:500}
    .btn:hover{opacity:0.85}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-secondary{background:var(--bg-hover);color:var(--text-primary)}
    .btn-danger{background:transparent;color:var(--danger);font-size:12px}
    .btn-danger:hover{background:rgba(234,0,56,0.08)}
    .btn-sm{padding:5px 10px;font-size:12px}
    .add-row{display:flex;gap:8px;margin-top:12px;align-items:center}
    .text-input{flex:1;padding:9px 12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:14px;outline:none}
    .text-input:focus{border-color:var(--accent)}
    .text-input::placeholder{color:var(--text-secondary)}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-secondary);border-radius:10px;padding:14px 18px;margin-bottom:8px}
    .toggle-label{font-size:14px}
    .toggle-desc{font-size:12px;color:var(--text-secondary);margin-top:3px}
    .toggle{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle .slider{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:12px;transition:0.2s}
    .toggle .slider::before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.2s}
    .toggle input:checked+.slider{background:var(--accent)}
    .toggle input:checked+.slider::before{transform:translateX(20px)}
    .schedule-row{display:flex;gap:8px;align-items:center;padding:12px 18px;background:var(--bg-secondary);border-radius:10px;margin-bottom:8px}
    .schedule-row input[type="time"]{background:var(--bg-primary);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text-primary);font-size:13px;outline:none}
    .schedule-row label{font-size:13px;color:var(--text-secondary)}
    .actions-row{display:flex;gap:8px;margin-top:8px}
    .version{text-align:center;margin-top:28px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-secondary)}

    /* Emoji Picker */
    .emoji-picker-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100}
    .emoji-picker-overlay.active{display:flex;align-items:center;justify-content:center}
    .emoji-picker{background:var(--bg-secondary);border-radius:12px;padding:16px;width:360px;max-height:400px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
    .emoji-picker-title{font-size:14px;font-weight:600;margin-bottom:12px}
    .emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:300px;overflow-y:auto}
    .emoji-grid::-webkit-scrollbar{width:4px}
    .emoji-grid::-webkit-scrollbar-thumb{background:#374045;border-radius:2px}
    .emoji-btn{font-size:24px;padding:6px;border:none;background:none;border-radius:6px;cursor:pointer;transition:background 0.1s;text-align:center}
    .emoji-btn:hover{background:var(--bg-hover)}
    .emoji-picker-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}

    .edit-input{font-size:14px;padding:6px 10px;background:var(--bg-primary);border:1px solid var(--accent);border-radius:6px;color:var(--text-primary);outline:none;flex:1}
  </style>
</head>
<body>
  <h1>Configuracoes</h1>

  <h2>Contas WhatsApp</h2>
  <div class="section">
    <div class="card" id="account-card"><div id="account-list"></div></div>
    <div class="add-row">
      <span class="account-emoji" id="add-emoji-btn" title="Escolher emoji">💬</span>
      <input type="hidden" id="new-emoji" value="" />
      <input type="text" id="new-name" class="text-input" placeholder="Nome da nova conta (ex: Trabalho)" maxlength="30" />
      <button class="btn btn-primary" id="btn-add">Adicionar</button>
    </div>
  </div>

  <h2>Geral</h2>
  <div class="section">
    <div class="toggle-row">
      <div><div class="toggle-label">Iniciar com o sistema</div><div class="toggle-desc">Abre minimizado na bandeja ao ligar o computador</div></div>
      <label class="toggle"><input type="checkbox" id="toggle-autostart" /><span class="slider"></span></label>
    </div>
  </div>

  <h2>Nao Perturbe</h2>
  <div class="section">
    <div class="toggle-row">
      <div><div class="toggle-label">Silenciar notificacoes</div><div class="toggle-desc">Bloqueia todas as notificacoes de todas as contas</div></div>
      <label class="toggle"><input type="checkbox" id="toggle-dnd" /><span class="slider"></span></label>
    </div>
    <div class="schedule-row">
      <label>De</label><input type="time" id="dnd-start" value="22:00" />
      <label>ate</label><input type="time" id="dnd-end" value="07:00" />
      <button class="btn btn-secondary btn-sm" id="btn-save-schedule">Salvar horario</button>
    </div>
  </div>

  <h2>Dados</h2>
  <div class="section">
    <div class="actions-row">
      <button class="btn btn-secondary" id="btn-export">Exportar configuracoes</button>
      <button class="btn btn-secondary" id="btn-import">Importar configuracoes</button>
    </div>
  </div>

  <div class="version">WhatsApp Desktop v2.0.0</div>

  <!-- Emoji Picker Overlay -->
  <div class="emoji-picker-overlay" id="emoji-overlay">
    <div class="emoji-picker">
      <div class="emoji-picker-title">Escolha um emoji</div>
      <div class="emoji-grid" id="emoji-grid"></div>
      <div class="emoji-picker-actions">
        <button class="btn btn-secondary btn-sm" id="emoji-clear">Remover emoji</button>
        <button class="btn btn-secondary btn-sm" id="emoji-cancel">Cancelar</button>
      </div>
    </div>
  </div>

<script>
var EMOJIS = [
  '😀','😃','😄','😁','😆','😅','🤣','😂','🙂','😊',
  '😇','🥰','😍','🤩','😘','😋','😛','🤑','🤗','🤭',
  '🤫','🤔','😐','😑','😶','😏','😒','🙄','😬','😮',
  '😯','😲','😳','🥺','😦','😧','😨','😰','😥','😢',
  '😭','😱','😖','😣','😞','😓','😩','😤','😡','🤬',
  '💼','💻','📱','🏠','🏢','🏭','🏪','🛒','💰','💳',
  '📞','📧','✉️','📝','📋','📊','📈','📉','🔔','🔕',
  '💬','💭','🗯️','👨‍💻','👩‍💻','👨‍💼','👩‍💼','👨‍🔧','👩‍🔧','🧑‍💼',
  '🟢','🔴','🟡','🟠','🔵','🟣','⚫','⚪','🟤','💜',
  '❤️','🧡','💛','💚','💙','💔','💯','✅','❌','⭐',
  '🌟','🔥','💡','🎯','🚀','🎉','🎊','🏆','👑','💎',
  '🐱','🐶','🦁','🐻','🐼','🦊','🐰','🐸','🐵','🦄',
  '1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟',
  '🇧🇷','🇺🇸','🇪🇸','🇫🇷','🇩🇪','🇮🇹','🇯🇵','🇰🇷','🇨🇳','🇬🇧'
];

var accountList = document.getElementById('account-list');
var editingId = null;
var emojiCallback = null;

// --- Emoji Picker ---
var emojiOverlay = document.getElementById('emoji-overlay');
var emojiGrid = document.getElementById('emoji-grid');

function initEmojiGrid() {
  EMOJIS.forEach(function(e) {
    var btn = document.createElement('button');
    btn.className = 'emoji-btn';
    btn.textContent = e;
    btn.onclick = function() { selectEmoji(e); };
    emojiGrid.appendChild(btn);
  });
}

function openEmojiPicker(callback) {
  emojiCallback = callback;
  emojiOverlay.classList.add('active');
}

function selectEmoji(emoji) {
  emojiOverlay.classList.remove('active');
  if (emojiCallback) emojiCallback(emoji);
  emojiCallback = null;
}

document.getElementById('emoji-cancel').onclick = function() {
  emojiOverlay.classList.remove('active');
  emojiCallback = null;
};

document.getElementById('emoji-clear').onclick = function() {
  emojiOverlay.classList.remove('active');
  if (emojiCallback) emojiCallback('');
  emojiCallback = null;
};

emojiOverlay.onclick = function(e) {
  if (e.target === emojiOverlay) {
    emojiOverlay.classList.remove('active');
    emojiCallback = null;
  }
};

initEmojiGrid();

// --- Add emoji btn ---
var addEmojiBtn = document.getElementById('add-emoji-btn');
var newEmojiInput = document.getElementById('new-emoji');
addEmojiBtn.onclick = function() {
  openEmojiPicker(function(emoji) {
    newEmojiInput.value = emoji;
    addEmojiBtn.textContent = emoji || '💬';
  });
};

// --- Contas ---
async function loadAccounts() {
  var accounts = await window.configAPI.getAccounts();
  renderAccounts(accounts);
}

function renderAccounts(accounts) {
  if (!accounts || accounts.length === 0) {
    accountList.innerHTML = '<div style="padding:12px;color:var(--text-secondary)">Nenhuma conta configurada</div>';
    return;
  }
  accountList.innerHTML = '';
  accounts.forEach(function(account, index) {
    var item = document.createElement('div');
    item.className = 'account-item';
    var emoji = account.emoji || '💬';
    var theme = account.theme || 'system';

    if (editingId === account.id) {
      item.innerHTML =
        '<span class="account-emoji" id="edit-emoji-display-' + account.id + '">' + (account.emoji || '💬') + '</span>' +
        '<div class="account-info"><input class="edit-input" value="' + esc(account.name) + '" id="edit-name-' + account.id + '" /></div>' +
        '<div class="account-actions">' +
          '<button class="btn btn-primary btn-sm" id="save-btn-' + account.id + '">Salvar</button>' +
          '<button class="btn btn-secondary btn-sm" id="cancel-btn-' + account.id + '">Cancelar</button>' +
        '</div>';

      item.querySelector('#edit-emoji-display-' + account.id).onclick = function() {
        openEmojiPicker(function(e) {
          document.getElementById('edit-emoji-display-' + account.id).textContent = e || '💬';
          document.getElementById('edit-emoji-display-' + account.id).setAttribute('data-emoji', e);
        });
      };
      item.querySelector('#save-btn-' + account.id).onclick = function() { saveEdit(account.id); };
      item.querySelector('#cancel-btn-' + account.id).onclick = function() { cancelEdit(); };
    } else {
      item.innerHTML =
        '<span class="account-emoji" id="emoji-' + account.id + '">' + emoji + '</span>' +
        '<div class="account-info">' +
          '<div class="account-name-row">' +
            '<span class="account-name">' + esc(account.name) + '</span>' +
            '<span class="account-shortcut">Ctrl+' + (index + 1) + '</span>' +
          '</div>' +
          '<div class="account-theme-row">' +
            '<span class="account-theme-label">Tema:</span>' +
            '<select id="theme-' + account.id + '">' +
              '<option value="system"' + (theme === 'system' ? ' selected' : '') + '>Sistema</option>' +
              '<option value="dark"' + (theme === 'dark' ? ' selected' : '') + '>Escuro</option>' +
              '<option value="light"' + (theme === 'light' ? ' selected' : '') + '>Claro</option>' +
            '</select>' +
          '</div>' +
        '</div>' +
        '<div class="account-actions">' +
          '<button class="btn btn-secondary btn-sm" id="edit-btn-' + account.id + '">Editar</button>' +
          '<button class="btn btn-danger btn-sm" id="del-btn-' + account.id + '">Remover</button>' +
        '</div>';

      // Bind events after innerHTML
      item.querySelector('#emoji-' + account.id).onclick = function() {
        openEmojiPicker(function(e) { setEmoji(account.id, e); });
      };
      item.querySelector('#theme-' + account.id).onchange = function() { setTheme(account.id, this.value); };
      item.querySelector('#edit-btn-' + account.id).onclick = function() { startEdit(account.id); };
      item.querySelector('#del-btn-' + account.id).onclick = function() { removeAccount(account.id, account.name); };
    }
    accountList.appendChild(item);
  });
}

async function addAccount() {
  var name = document.getElementById('new-name').value.trim();
  if (!name) return;
  var emoji = newEmojiInput.value;
  await window.configAPI.addAccount(name, emoji);
  document.getElementById('new-name').value = '';
  newEmojiInput.value = '';
  addEmojiBtn.textContent = '💬';
  await loadAccounts();
}

async function removeAccount(id, name) {
  if (confirm('Remover a conta "' + name + '"?\nVoce precisara escanear o QR Code novamente.')) {
    var accounts = await window.configAPI.removeAccount(id);
    renderAccounts(accounts);
  }
}

async function setEmoji(id, emoji) {
  var accounts = await window.configAPI.setEmoji(id, emoji);
  renderAccounts(accounts);
}

async function setTheme(id, theme) {
  await window.configAPI.setTheme(id, theme);
}

function startEdit(id) { editingId = id; loadAccounts(); }
function cancelEdit() { editingId = null; loadAccounts(); }

async function saveEdit(id) {
  var nameInput = document.getElementById('edit-name-' + id);
  var emojiDisplay = document.getElementById('edit-emoji-display-' + id);
  var name = nameInput.value.trim();
  var emoji = emojiDisplay.getAttribute('data-emoji') || emojiDisplay.textContent;
  if (emoji === '💬') emoji = '';
  if (!name) return;
  editingId = null;
  await window.configAPI.renameAccount(id, name);
  await window.configAPI.setEmoji(id, emoji);
  await loadAccounts();
}

function esc(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// --- Autostart ---
var toggleAutostart = document.getElementById('toggle-autostart');
async function loadAutostart() { toggleAutostart.checked = await window.configAPI.getAutostart(); }
toggleAutostart.onchange = function() { window.configAPI.setAutostart(toggleAutostart.checked); };

// --- DnD ---
var toggleDnd = document.getElementById('toggle-dnd');
var dndStart = document.getElementById('dnd-start');
var dndEnd = document.getElementById('dnd-end');
async function loadDnd() {
  toggleDnd.checked = await window.configAPI.getDnd();
  var s = await window.configAPI.getDndSchedule();
  dndStart.value = s.start || '22:00';
  dndEnd.value = s.end || '07:00';
}
toggleDnd.onchange = function() { window.configAPI.setDnd(toggleDnd.checked); };
document.getElementById('btn-save-schedule').onclick = async function() {
  await window.configAPI.setDndSchedule(dndStart.value, dndEnd.value);
  this.textContent = 'Salvo!';
  var btn = this;
  setTimeout(function() { btn.textContent = 'Salvar horario'; }, 1500);
};

// --- Export/Import ---
document.getElementById('btn-export').onclick = async function() {
  var ok = await window.configAPI.exportConfig();
  if (ok) { this.textContent = 'Exportado!'; var b = this; setTimeout(function() { b.textContent = 'Exportar configuracoes'; }, 1500); }
};
document.getElementById('btn-import').onclick = async function() {
  var ok = await window.configAPI.importConfig();
  if (ok) { this.textContent = 'Importado!'; var b = this; setTimeout(function() { b.textContent = 'Importar configuracoes'; }, 1500); loadAccounts(); loadDnd(); loadAutostart(); }
};

// --- Events ---
document.getElementById('btn-add').onclick = addAccount;
document.getElementById('new-name').onkeydown = function(e) { if (e.key === 'Enter') addAccount(); };

// --- Init ---
loadAccounts();
loadAutostart();
loadDnd();
</script>
</body>
</html>
